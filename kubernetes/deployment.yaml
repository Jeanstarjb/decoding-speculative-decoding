apiVersion: apps/v1
kind: Deployment
metadata:
  name: speculative-decoding-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: speculative-decoding-api
  template:
    metadata:
      labels:
        app: speculative-decoding-api
    spec:
      containers:
      - name: api
        image: speculative-decoding-api:latest
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_HOST
          value: redis
---
apiVersion: v1
kind: Service
metadata:
  name: speculative-decoding-api
spec:
  selector:
    app: speculative-decoding-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
